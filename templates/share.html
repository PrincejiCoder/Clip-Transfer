<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LinkDrop | Link Created</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#343535",
                        "on-tertiary-fixed-variant": "#474646",
                        "surface-container": "#1f2020",
                        "on-secondary-container": "#00686f",
                        "on-surface-variant": "#c4c7c8",
                        "on-error-container": "#ffdad6",
                        "surface-container-lowest": "#0d0e0f",
                        "on-tertiary": "#313030",
                        "on-surface": "#e3e2e2",
                        "error-container": "#93000a",
                        "primary": "#ffffff",
                        "inverse-surface": "#e3e2e2",
                        "outline": "#8e9192",
                        "primary-fixed": "#e2e2e2",
                        "surface-container-low": "#1b1c1c",
                        "surface-container-highest": "#343535",
                        "background": "#121414",
                        "on-secondary-fixed": "#002022",
                        "on-primary": "#2f3131",
                        "tertiary": "#ffffff",
                        "secondary-container": "#00eefc",
                        "primary-fixed-dim": "#c6c6c7",
                        "surface-dim": "#121414",
                        "secondary-fixed": "#7df4ff",
                        "on-primary-fixed": "#1a1c1c",
                        "primary-container": "#e2e2e2",
                        "tertiary-fixed-dim": "#c8c6c5",
                        "tertiary-container": "#e5e2e1",
                        "on-error": "#690005",
                        "secondary": "#d3fbff",
                        "surface-bright": "#383939",
                        "inverse-on-surface": "#303031",
                        "surface-tint": "#c6c6c7",
                        "on-secondary": "#00363a",
                        "inverse-primary": "#5d5f5f",
                        "surface": "#121414",
                        "secondary-fixed-dim": "#00dbe9",
                        "on-primary-fixed-variant": "#454747",
                        "on-tertiary-container": "#656464",
                        "on-primary-container": "#636565",
                        "on-secondary-fixed-variant": "#004f54",
                        "on-background": "#e3e2e2",
                        "tertiary-fixed": "#e5e2e1",
                        "outline-variant": "#444748",
                        "surface-container-high": "#292a2a",
                        "on-tertiary-fixed": "#1c1b1b",
                        "error": "#ffb4ab"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "stack-md": "24px",
                        "stack-lg": "48px",
                        "stack-sm": "12px",
                        "gutter": "24px",
                        "container-max": "640px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "h2": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-md": ["Inter"],
                        "display": ["Inter"],
                        "h1": ["Inter"],
                        "mono": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "h2": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        body { background-color: #000000; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .qr-gradient {
            background: linear-gradient(135deg, #00eefc 0%, #121414 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased text-on-background font-body-md overflow-x-hidden">
<!-- Success Shell suppression logic applied: Navigation hidden to focus on the transaction/share goal -->
<main class="min-h-screen flex flex-col items-center justify-center px-gutter py-stack-lg max-w-[640px] mx-auto">
<!-- Header Brand Anchor (Static variant for focused state) -->
<div class="mb-stack-lg text-center">
<div class="inline-flex items-center gap-2 mb-4">
<a href="/" class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary-container text-h1">terminal</span>
<h1 class="font-display text-h1 uppercase tracking-widest text-primary">LINKDROP</h1>
</a>
</div>
<p class="text-on-surface-variant font-body-md">Your drop is ready for the world.</p>
</div>
<!-- Share Card (Level 1 Surface) -->
<div class="w-full bg-[#121212] border border-[#222222] rounded-xl p-8 flex flex-col items-center gap-stack-md shadow-2xl relative overflow-hidden">
<!-- Stylized QR Code -->
<div class="relative group">
<div class="absolute -inset-4 bg-secondary-container/10 blur-3xl rounded-full opacity-50 group-hover:opacity-100 transition-opacity"></div>
<div class="relative w-64 h-64 bg-[#000000] border-4 border-secondary-container rounded-xl p-4 flex items-center justify-center">
{{ qr_svg }}
</div>
</div>
<!-- Link URL -->
<div class="w-full space-y-2 text-center mt-4">
<span class="font-label-caps text-on-tertiary-fixed-variant uppercase">PUBLIC URL</span>
<div id="url-container" class="bg-black/40 border border-[#222222] rounded-lg py-4 px-6 select-all cursor-pointer hover:border-secondary-container transition-colors group">
<code id="full-url" class="font-mono text-body-lg text-secondary-container break-all">{{ full_url }}</code>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col w-full gap-4 mt-2">
<button id="copy-url-btn" class="w-full bg-secondary-container hover:bg-secondary-fixed text-on-secondary font-bold text-body-md py-4 rounded-xl transition-all active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">content_copy</span>
                    Copy URL
                </button>
<a href="/{{ slug }}" class="w-full bg-transparent border border-primary/20 hover:border-primary/60 text-primary font-medium text-body-md py-4 rounded-xl transition-all active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">visibility</span>
                    View Content
                </a>
</div>
</div>
<!-- Back to Dashboard Link -->
<a class="mt-stack-lg group flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors" href="/">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
<span class="font-label-caps">Back to my drops</span>
</a>
</main>
<script>
    const copyUrlBtn = document.getElementById('copy-url-btn');
    const fullUrl = document.getElementById('full-url').innerText;
    const toast = document.getElementById('copy-toast');

    copyUrlBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(fullUrl).then(() => {
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(1rem)';
            }, 2000);
        });
    });
</script>
<div id="copy-toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 z-[100] opacity-0 pointer-events-none transition-all duration-300 transform translate-y-4">
<div class="bg-[#181818]/80 backdrop-blur-[20px] border border-[#333333] px-6 py-3 rounded-full flex items-center gap-3">
<span class="material-symbols-outlined text-secondary-container">check_circle</span>
<span class="font-body-md text-primary">URL copied to clipboard</span>
</div>
</div>
</body></html>
