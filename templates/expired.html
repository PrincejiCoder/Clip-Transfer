<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0f0f0f">
    <link rel="apple-touch-icon" href="/static/logo-square.png">
    <title>LinkDrop | Expired</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --vh: 100dvh;
        }
        @supports not (height: 100dvh) {
            :root {
                --vh: -webkit-fill-available;
            }
        }
        * {
            box-sizing: border-box;
        }
        html, body {
            height: var(--vh);
            margin: 0;
            padding: 0;
            overscroll-behavior-y: none;
        }
        body {
            background-color: #000000;
            color: #e3e2e2;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .page-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        header, footer {
            flex: 0 0 auto;
            flex-shrink: 0;
        }
        main {
            flex: 1;
            min-height: 0;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .expired-content {
            width: 100%;
            max-width: 640px;
            padding: 0 24px;
            text-align: center;
        }
    </style>
</head>
<body class="antialiased font-body-md">
    <div class="page-wrapper">
        <header class="bg-black text-white font-inter tracking-tight uppercase font-bold border-b border-zinc-900 z-50">
            <div class="flex justify-between items-center w-full max-w-[640px] mx-auto px-4 h-16">
                <a href="/" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                    <span class="material-symbols-outlined text-cyan-400" data-icon="terminal">terminal</span>
                    <h1 class="text-lg font-black tracking-widest text-white uppercase">LinkDrop</h1>
                </a>
                <a href="/" class="text-zinc-600 hover:text-cyan-400 transition-colors active:scale-95 p-2">
                    <span class="material-symbols-outlined" data-icon="home">home</span>
                </a>
            </div>
        </header>

        <main>
            <div class="expired-content space-y-10">
                <div class="space-y-4">
                    <h2 class="text-5xl font-black text-white tracking-tighter uppercase">Link Purged</h2>
                    <p class="text-zinc-500 font-medium max-w-[360px] mx-auto uppercase tracking-widest text-[10px]">
                        Secure destruction complete. This resource has reached its expiration boundary or view limit.
                    </p>
                </div>

                <div class="w-full max-w-[280px] mx-auto space-y-4">
                    <a href="/" class="block w-full py-5 bg-white text-black font-bold uppercase tracking-widest rounded-xl hover:bg-zinc-200 transition-all active:scale-95 text-xs text-center">
                        Return Home
                    </a>
                </div>

                <div class="w-full max-w-[400px] mx-auto">
                    <div class="bg-surface-container border border-zinc-900 p-6 rounded-xl flex items-center gap-5 text-left">
                        <div class="w-12 h-12 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center shrink-0">
                            <span class="material-symbols-outlined text-zinc-500">info</span>
                        </div>
                        <div>
                            <span class="block font-label-caps text-zinc-600 uppercase text-[9px] tracking-widest mb-1">Status Report</span>
                            <span class="font-mono text-xs text-on-surface">410 Gone / Resource Expired</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="bg-black py-6 border-t border-zinc-900 text-center">
             <div class="text-[10px] text-zinc-600 uppercase tracking-widest">&copy; 2026 LinkDrop &bull; Stealth Protocol</div>
        </footer>
    </div>
    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                try {
                    const reg = await navigator.serviceWorker.register('/static/sw.js');
                    console.log('SW registered:', reg.scope);
                } catch (err) {
                    console.error('SW registration failed:', err);
                }
            });
        }
    </script>
</body>
</html>
