<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0f0f0f">
    <link rel="apple-touch-icon" href="/static/logo-square.png">
    <title>LinkDrop | Offline</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --vh: 100dvh;
        }
        @supports not (height: 100dvh) {
            :root {
                --vh: -webkit-fill-available;
            }
        }
        * {
            box-sizing: border-box;
        }
        html, body {
            height: var(--vh);
            margin: 0;
            padding: 0;
            overscroll-behavior-y: none;
        }
        body {
            background-color: #000000;
            color: #e3e2e2;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .page-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        header, footer {
            flex: 0 0 auto;
            flex-shrink: 0;
        }
        main {
            flex: 1;
            min-height: 0;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .offline-content {
            width: 100%;
            max-width: 480px;
            padding: 0 24px;
            text-align: center;
        }
    </style>
</head>
<body class="antialiased font-['Inter']">
    <div class="page-wrapper">
        <header class="bg-black text-white font-inter tracking-tight uppercase font-bold border-b border-zinc-900 z-50">
            <div class="flex justify-between items-center w-full max-w-[640px] mx-auto px-6 h-16">
                <a href="/" class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-cyan-400">terminal</span>
                    <span class="text-lg font-black tracking-widest text-white uppercase">LinkDrop</span>
                </a>
            </div>
        </header>

        <main>
            <div class="offline-content space-y-8">
                <div class="relative inline-flex items-center justify-center">
                    <div class="absolute -inset-4 bg-cyan-500/10 blur-2xl rounded-full opacity-50"></div>
                    <div class="relative w-24 h-24 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center">
                        <span class="material-symbols-outlined text-5xl text-zinc-500">signal_disconnected</span>
                    </div>
                </div>
                
                <div class="space-y-3">
                    <h1 class="text-4xl font-black tracking-tighter text-white uppercase">Signal Lost</h1>
                    <p class="text-lg font-bold text-zinc-400 uppercase tracking-widest">Protocol Offline</p>
                </div>

                <p class="text-zinc-500 text-sm leading-relaxed max-w-[320px] mx-auto">
                    You're disconnected from the secure network. LinkDrop requires an active uplink to sync with the stealth protocol.
                </p>

                <div class="pt-4">
                    <button onclick="window.location.reload()" class="inline-block bg-white text-black font-bold py-4 px-10 rounded-xl transition-all active:scale-95 hover:bg-zinc-200 uppercase tracking-widest text-xs">
                        Attempt Reconnection
                    </button>
                </div>
            </div>
        </main>

        <footer class="bg-black py-6 border-t border-zinc-900 text-center">
            <div class="text-[10px] text-zinc-600 uppercase tracking-widest">&copy; 2026 LinkDrop &bull; Secure Protocol</div>
        </footer>
    </div>
</body>
</html>
