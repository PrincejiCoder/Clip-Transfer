<html class="dark" lang="en"><head>

                        "primary": "#ffffff",
                        "on-surface": "#e3e2e2",
                        "surface-dim": "#121414",
                        "on-secondary-fixed-variant": "#004f54",
                        "on-secondary-fixed": "#002022",
                        "inverse-primary": "#5d5f5f",
                        "surface-container": "#1f2020",

<style>
        body {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-focus-accent:focus-within {
            border-color: #00F0FF !important;
            box-shadow: 0 0 0 1px #00F0FF;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased">
<!-- TopAppBar -->
<header class="bg-black text-white font-['Inter'] tracking-tight antialiased border-b border-zinc-900 sticky top-0 z-50">
<div class="flex justify-between items-center w-full max-w-[640px] mx-auto px-6 h-16">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-white" data-icon="bolt">bolt</span>
<span class="text-lg font-black tracking-tighter text-white">LINKDROP</span>
</div>
</div>
</header>
<main class="min-h-[calc(100vh-128px)] flex flex-col items-center justify-center px-6 max-w-[640px] mx-auto">
<!-- Hero Section -->
<div class="w-full text-center mb-stack-lg">
<h1 class="font-display text-display mb-stack-sm text-white">
                Drop text. <br/>Share instantly.
            </h1>
<p class="font-body-md text-body-md text-zinc-500 max-w-[400px] mx-auto">
                The high-performance workspace for minimalist link management and swift data transfers.
            </p>
</div>
<!-- Central Action Zone -->
<div class="w-full space-y-stack-md">
<div class="relative group input-focus-accent transition-all duration-300 bg-[#121212] border border-[#222222] rounded-xl overflow-hidden">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-600">
<span class="material-symbols-outlined" data-icon="terminal">terminal</span>
</div>
<input id="keyword-input" class="w-full bg-transparent border-none py-6 pl-12 pr-6 text-white font-body-lg placeholder-zinc-700 focus:ring-0" placeholder="/ enter keyword" type="text"/>
</div>
<button id="open-button" class="w-full bg-white text-black font-h2 py-5 rounded-xl transition-transform active:scale-[0.98] duration-150 hover:bg-zinc-200">
                Open
            </button>
</div>
<script>
    const input = document.getElementById('keyword-input');
    const button = document.getElementById('open-button');
    const handleRedirect = () => {
        const val = input.value.trim();
        if (val) {
            window.location.href = '/' + val;
        }
    };
    button.addEventListener('click', handleRedirect);
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleRedirect();
    });
</script>
</main>
<!-- Footer -->
<footer class="bg-black font-['Inter'] text-[10px] uppercase tracking-widest py-8 border-t border-zinc-900">
</body></html>
