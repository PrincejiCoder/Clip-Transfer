<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0f0f0f">
    <link rel="apple-touch-icon" href="/static/logo-square.png">
    <title>LinkDrop - Stealth Premium Link Management</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#343535",
                        "surface-container-high": "#292a2a",
                        "outline-variant": "#444748",
                        "inverse-surface": "#e3e2e2",
                        "surface-tint": "#c6c6c7",
                        "on-tertiary": "#313030",
                        "outline": "#8e9192",
                        "tertiary-fixed-dim": "#c8c6c5",
                        "on-surface-variant": "#c4c7c8",
                        "tertiary": "#ffffff",
                        "tertiary-container": "#e5e2e1",
                        "primary-fixed-dim": "#c6c6c7",
                        "on-primary-fixed": "#1a1c1c",
                        "secondary-fixed-dim": "#00dbe9",
                        "on-primary": "#2f3131",
                        "on-tertiary-fixed-variant": "#474646",
                        "surface-container-highest": "#343535",
                        "on-secondary": "#00363a",
                        "on-tertiary-container": "#656464",
                        "on-primary-container": "#636565",
                        "on-tertiary-fixed": "#1c1b1b",
                        "on-error": "#690005",
                        "secondary-container": "#00eefc",
                        "surface-container-lowest": "#0d0e0f",
                        "error": "#ffb4ab",
                        "surface": "#000000",
                        "error-container": "#93000a",
                        "on-secondary-container": "#00686f",
                        "tertiary-fixed": "#e5e2e1",
                        "secondary-fixed": "#7df4ff",
                        "primary-fixed": "#e2e2e2",
                        "surface-bright": "#383939",
                        "on-error-container": "#ffdad6",
                        "secondary": "#d3fbff",
                        "on-background": "#e3e2e2",
                        "inverse-on-surface": "#303031",
                        "primary-container": "#e2e2e2",
                        "background": "#000000",
                        "primary": "#ffffff",
                        "on-surface": "#e3e2e2",
                        "surface-dim": "#121414",
                        "on-secondary-fixed-variant": "#004f54",
                        "on-secondary-fixed": "#002022",
                        "inverse-primary": "#5d5f5f",
                        "surface-container": "#1f2020",
                        "surface-container-low": "#1b1c1c",
                        "on-primary-fixed-variant": "#454747"
                    },
                    "borderRadius": {
                        "DEFAULT": "12px",
                        "lg": "12px",
                        "xl": "12px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-max": "640px",
                        "stack-lg": "48px",
                        "stack-sm": "12px",
                        "stack-md": "24px",
                        "gutter": "24px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "h2": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "h1": ["Inter"],
                        "label-caps": ["Inter"],
                        "display": ["Inter"]
                    },
                    "fontSize": {
                        "h2": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
    <style>
        :root {
            --vh: 100dvh;
        }
        @supports not (height: 100dvh) {
            :root {
                --vh: -webkit-fill-available;
            }
        }
        * {
            box-sizing: border-box;
        }
        html, body {
            height: var(--vh);
            margin: 0;
            padding: 0;
            overscroll-behavior-y: none;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .page-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        header, footer {
            flex: 0 0 auto;
            flex-shrink: 0;
        }
        main {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .hero-content {
            width: 100%;
            max-width: 640px;
            padding: 0 24px;
            text-align: center;
        }
    </style>
</head>
<body class="antialiased selection:bg-secondary-container selection:text-on-secondary-container">
    <div class="page-wrapper">
        <header class="bg-black text-white font-inter tracking-tight antialiased border-b border-zinc-900 z-50">
            <div class="flex justify-between items-center w-full max-w-[640px] mx-auto px-6 h-16">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-white" data-icon="bolt">bolt</span>
                    <span class="text-lg font-black tracking-tighter text-white uppercase">LinkDrop</span>
                </div>
            </div>
        </header>

        <main>
            <div class="hero-content">
                <div class="w-full text-center mb-stack-lg">
                    <h1 class="font-display text-display mb-stack-sm text-white">
                        Drop text. <br/>Share instantly.
                    </h1>
                    <p class="font-body-md text-body-md text-zinc-500 max-w-[400px] mx-auto">
                        The high-performance workspace for minimalist link management and swift data transfers.
                    </p>
                </div>

                <div class="space-y-4">
                    <div class="relative bg-surface-container border border-zinc-800 rounded-xl overflow-hidden focus-within:border-white transition-colors group">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-zinc-700 group-focus-within:text-white transition-colors">search</span>
                        <input id="keyword-input" class="w-full bg-transparent border-none py-6 pl-12 pr-6 text-white font-body-lg placeholder-zinc-700 focus:ring-0" placeholder="/ enter keyword" type="text" autocomplete="off" spellcheck="false" autocapitalize="none" autocorrect="off"/>
                    </div>

                    <button id="open-button" class="w-full bg-white text-black font-h2 py-5 rounded-xl transition-all active:scale-95 hover:bg-zinc-200 uppercase tracking-widest text-sm font-bold">
                        Open Drop
                    </button>
                </div>
            </div>
        </main>

        <footer class="bg-black font-inter text-[10px] uppercase tracking-widest py-6 border-t border-zinc-900 text-center text-zinc-600">
            <div class="max-w-[640px] mx-auto px-6">
                &copy; 2026 LinkDrop &bull; Secure Stealth Protocol
            </div>
        </footer>
    </div>

    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                try {
                    const reg = await navigator.serviceWorker.register('/static/sw.js');
                    console.log('SW registered:', reg.scope);
                } catch (err) {
                    console.error('SW registration failed:', err);
                }
            });
        }

        const input = document.getElementById('keyword-input');
        const button = document.getElementById('open-button');

        const handleRedirect = () => {
            const val = input.value.trim().toLowerCase().replace(/\s+/g, '-');
            if (val) {
                window.location.href = '/' + val;
            }
        };

        button.addEventListener('click', handleRedirect);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleRedirect();
        });
    </script>
</body>
</html>
