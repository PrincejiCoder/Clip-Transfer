<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#343535",
                    "on-tertiary-fixed-variant": "#474646",
                    "surface-container": "#1f2020",
                    "on-secondary-container": "#00686f",
                    "on-surface-variant": "#c4c7c8",
                    "on-error-container": "#ffdad6",
                    "surface-container-lowest": "#0d0e0f",
                    "on-tertiary": "#313030",
                    "on-surface": "#e3e2e2",
                    "error-container": "#93000a",
                    "primary": "#ffffff",
                    "inverse-surface": "#e3e2e2",
                    "outline": "#8e9192",
                    "primary-fixed": "#e2e2e2",
                    "surface-container-low": "#1b1c1c",
                    "surface-container-highest": "#343535",
                    "background": "#000000",
                    "on-secondary-fixed": "#002022",
                    "on-primary": "#2f3131",
                    "tertiary": "#ffffff",
                    "secondary-container": "#00eefc",
                    "primary-fixed-dim": "#c6c6c7",
                    "surface-dim": "#121414",
                    "secondary-fixed": "#7df4ff",
                    "on-primary-fixed": "#1a1c1c",
                    "primary-container": "#e2e2e2",
                    "tertiary-fixed-dim": "#c8c6c5",
                    "tertiary-container": "#e5e2e1",
                    "on-error": "#690005",
                    "secondary": "#d3fbff",
                    "surface-bright": "#383939",
                    "inverse-on-surface": "#303031",
                    "surface-tint": "#c6c6c7",
                    "on-secondary": "#00363a",
                    "inverse-primary": "#5d5f5f",
                    "surface": "#121414",
                    "secondary-fixed-dim": "#00dbe9",
                    "on-primary-fixed-variant": "#454747",
                    "on-tertiary-container": "#656464",
                    "on-primary-container": "#636565",
                    "on-secondary-fixed-variant": "#004f54",
                    "on-background": "#e3e2e2",
                    "tertiary-fixed": "#e5e2e1",
                    "outline-variant": "#444748",
                    "surface-container-high": "#292a2a",
                    "on-tertiary-fixed": "#1c1b1b",
                    "error": "#ffb4ab"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "12px",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "base": "8px",
                    "stack-md": "24px",
                    "stack-lg": "48px",
                    "stack-sm": "12px",
                    "gutter": "24px",
                    "container-max": "640px"
            },
            "fontFamily": {
                    "body-lg": ["Inter"],
                    "h2": ["Inter"],
                    "label-caps": ["Inter"],
                    "body-md": ["Inter"],
                    "display": ["Inter"],
                    "h1": ["Inter"]
            },
            "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "h2": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        body { background-color: #000000; color: #e3e2e2; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #222222; border-radius: 10px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md">
<!-- TopAppBar -->
<header class="bg-black text-cyan-400 font-inter tracking-tight uppercase font-bold docked full-width top-0 border-b border-zinc-900 flat no-shadows z-50">
<div class="flex justify-between items-center w-full max-w-[640px] mx-auto px-4 h-16">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-cyan-400" data-icon="terminal">terminal</span>
<h1 class="text-lg font-black tracking-widest text-white uppercase">LinkDrop / {{ slug }}</h1>
</div>
<a href="/" class="hover:text-cyan-400 transition-colors active:scale-95 transition-transform text-zinc-600">
<span class="material-symbols-outlined" data-icon="home">home</span>
</a>
</div>
</header>
<main class="max-w-[1024px] mx-auto px-4 pt-6 pb-6 h-[calc(100vh-64px)] flex flex-col space-y-4">
<form action="/{{ slug }}" method="post" id="drop-form" class="flex flex-col h-full space-y-4">

<!-- Context Header -->
<div class="flex items-center justify-between shrink-0">
    <div class="space-y-1">
        <h2 class="font-h1 text-h2 text-white uppercase tracking-tighter">Drop Link</h2>
    </div>
    <div class="text-cyan-400 font-mono text-lg font-bold">/{{ slug }}</div>
</div>

<!-- Top Action Bar (Moved from bottom) -->
<div class="shrink-0 flex flex-wrap md:flex-nowrap items-center gap-4 bg-surface-container border border-zinc-900 p-3 rounded-lg">
    
    <!-- Left: Create Button -->
    <button type="submit" class="bg-cyan-400 text-black font-bold text-[13px] px-5 py-2 rounded flex items-center justify-center gap-2 active:scale-[0.98] transition-all hover:brightness-110 shadow-[0_0_15px_rgba(0,238,252,0.1)] whitespace-nowrap uppercase tracking-widest">
        <span class="material-symbols-outlined font-bold text-[18px]" data-icon="bolt">bolt</span>
        <span>Create Link</span>
    </button>

    <!-- Options Container -->
    <div class="flex items-center gap-5 overflow-x-auto">
        <!-- Allow Edits -->
        <div class="flex items-center gap-2 shrink-0">
            <input type="checkbox" id="allow_edit_cb" name="allow_edit" value="true" class="w-4 h-4 rounded border-zinc-700 bg-zinc-900 text-cyan-400 focus:ring-cyan-400 focus:ring-offset-zinc-900">
            <label class="font-label-caps text-[10px] text-zinc-400 uppercase tracking-widest cursor-pointer select-none" for="allow_edit_cb">Allow Edit</label>
        </div>

        <!-- Max Views -->
        <div class="flex items-center gap-2 shrink-0 border-l border-zinc-800 pl-4">
            <label class="font-label-caps text-[10px] text-zinc-500 uppercase tracking-widest">Max Views</label>
            <input name="burn_after" class="w-14 h-7 bg-zinc-900 text-center font-mono text-white border border-zinc-800 rounded focus:border-cyan-400 focus:ring-0 px-2 text-xs" type="number" value="0" min="0"/>
        </div>

        <!-- Expiry Dropdown -->
        <div class="flex items-center gap-2 shrink-0 border-l border-zinc-800 pl-4">
            <label class="font-label-caps text-[10px] text-zinc-500 uppercase tracking-widest">Expires</label>
            <select name="expiration" class="h-7 bg-zinc-900 text-white border border-zinc-800 rounded focus:border-cyan-400 focus:ring-0 font-label-caps text-[10px] uppercase tracking-wider px-2 py-0 cursor-pointer appearance-none">
                <option value="1hour">1 Hour</option>
                <option value="24hour">1 Day</option>
                <option value="1week" selected>1 Week</option>
                <option value="1month">1 Month</option>
                <option value="never">Never</option>
            </select>
        </div>
    </div>
</div>

<!-- Main Input Canvas (Full height) -->
<div class="relative group flex-grow flex flex-col">
    <textarea name="content" required maxlength="1048576" class="w-full h-full flex-grow bg-surface-container border border-zinc-800 rounded-lg p-6 text-body-md text-white placeholder-zinc-700 focus:outline-none focus:border-zinc-700 focus:ring-0 transition-all resize-none font-mono" placeholder="Paste your URL or raw content here...">{{ content }}</textarea>
    <div class="absolute bottom-4 right-4 flex items-center gap-2 px-3 py-1.5 bg-black/50 backdrop-blur-md rounded-full border border-zinc-800 pointer-events-none">
        <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
        <span class="font-label-caps text-[10px] text-zinc-500 uppercase">Live Buffer</span>
    </div>
</div>

</form>
</main>
</body></html>
